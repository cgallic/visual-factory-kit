<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ headline }}</title>
  <style>
    {{ font_css | safe }}
    {{ tokens_css | safe }}
    {{ shared_css | safe }}
    :root { --canvas-width: {{ width }}px; --canvas-height: {{ height }}px; --safe-left: 96px; --safe-top: 78px; }
    .brand-mark { font-size: 22px; }
    .copy { left: 112px; top: 178px; width: 900px; }
    .headline { max-height: 318px; font-size: 84px; }
    .subhead { margin-top: 28px; width: 690px; max-height: 92px; font-size: 32px; }
    .proof-pill { margin-top: 34px; max-width: 760px; font-size: 32px; }
    .mascot-wrap { right: 86px; bottom: 24px; width: 500px; height: 660px; }
    .glass-panel { right: 150px; top: 132px; width: 370px; height: 540px; }
    .flow-wrap { position: absolute; left: 112px; bottom: 136px; width: 620px; z-index: 4; }
    .phone-cta { right: 80px; bottom: 72px; }
    .phone-cta .number { font-size: 36px; }
  </style>
</head>
<body>
  <main class="canvas" role="img" aria-label="{{ alt_text }}">
    <div class="brand-mark"><img class="brand-icon" src="{{ brand_icon_uri }}" alt=""><span>{{ brand_name }}</span></div>
    <section class="safe-content copy">
      <div class="kicker">Editorial brief</div>
      <h1 class="headline" data-fit="headline" data-min-font-size="52">{{ headline }}</h1>
      <p class="subhead" data-fit="subhead" data-min-font-size="20">{{ subhead }}</p>
      <div class="proof-pill" data-fit="proof" data-min-font-size="14">{{ proof_label }}</div>
    </section>
    <div class="flow-wrap mini-flow" aria-hidden="true">
      <div class="mini-step"><strong>Answer</strong>the call</div>
      <div class="mini-step"><strong>Remember</strong>details</div>
      <div class="mini-step"><strong>Act</strong>fast</div>
      <div class="mini-step"><strong>Brief</strong>owner</div>
    </div>
    <div class="glass-panel"></div>
    <div class="mascot-wrap"><img class="mascot" src="{{ mascot_uri }}" alt=""></div>
    <div class="phone-cta" data-fit="phone"><span class="label">{{ cta }}</span><span class="number">{{ phone_number }}</span></div>
  </main>
</body>
</html>
