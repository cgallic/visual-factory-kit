<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ headline }}</title>
  <style>
    {{ font_css | safe }}
    {{ tokens_css | safe }}
    {{ shared_css | safe }}
    {% set s = scale_landscape %}
    :root { --canvas-width: {{ width }}px; --canvas-height: {{ height }}px; --safe-left: {{ (width * 0.08)|round|int }}px; --safe-top: {{ (height * 0.12)|round|int }}px; }
    .brand-mark { font-size: {{ (24*s)|round|int }}px; }
    .brand-icon { width: {{ (44*s)|round|int }}px; height: {{ (44*s)|round|int }}px; }
    .copy { left: {{ (width * 0.25)|round|int }}px; top: {{ (height * 0.22)|round|int }}px; width: {{ (width * 0.46)|round|int }}px; }
    .headline { max-height: {{ (height * 0.32)|round|int }}px; font-size: {{ (78*s)|round|int }}px; }
    .subhead { margin-top: {{ (20*s)|round|int }}px; width: {{ (width * 0.43)|round|int }}px; max-height: {{ (height * 0.12)|round|int }}px; font-size: {{ (28*s)|round|int }}px; }
    .mascot-wrap { right: {{ (width * 0.08)|round|int }}px; bottom: {{ (height * 0.05)|round|int }}px; width: {{ (height * 0.58)|round|int }}px; height: {{ (height * 0.74)|round|int }}px; }
    .phone-cta { left: {{ (width * 0.08)|round|int }}px; bottom: {{ (height * 0.14)|round|int }}px; align-items: flex-start; }
    .phone-cta .number { font-size: {{ (30*s)|round|int }}px; }
  </style>
</head>
<body>
  <main class="canvas" role="img" aria-label="{{ alt_text }}">
    <div class="brand-mark"><img class="brand-icon" src="{{ brand_icon_uri }}" alt=""><span>{{ brand_name }}</span></div>
    <section class="safe-content copy">
      <h1 class="headline" data-fit="headline" data-min-font-size="{{ (40*s)|round|int }}">{{ headline }}</h1>
      <p class="subhead" data-fit="subhead" data-min-font-size="{{ (16*s)|round|int }}">{{ subhead }}</p>
    </section>
    <div class="mascot-wrap"><img class="mascot" src="{{ mascot_uri }}" alt=""></div>
    <div class="phone-cta" data-fit="phone" data-min-font-size="{{ (12*s)|round|int }}"><span class="label">{{ cta }}</span><span class="number">{{ phone_number }}</span></div>
  </main>
</body>
</html>
