<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ headline }}</title>
  <style>
    {{ font_css | safe }}
    {{ tokens_css | safe }}
    {{ shared_css | safe }}
    :root { --canvas-width: {{ width }}px; --canvas-height: {{ height }}px; --safe-left: 72px; --safe-top: 56px; }
    .copy { left: 78px; top: 132px; width: 690px; }
    .headline { max-height: 248px; font-size: 69px; }
    .subhead { margin-top: 22px; width: 560px; max-height: 72px; font-size: 25px; }
    .proof-pill { margin-top: 26px; max-width: 630px; font-size: 24px; }
    .mascot-wrap { right: 34px; bottom: 4px; width: 392px; height: 520px; }
    .glass-panel { right: 98px; top: 106px; width: 294px; height: 390px; }
    .phone-cta { right: 64px; bottom: 50px; }
  </style>
</head>
<body>
  <main class="canvas" role="img" aria-label="{{ alt_text }}">
    <div class="brand-mark"><img class="brand-icon" src="{{ brand_icon_uri }}" alt=""><span>{{ brand_name }}</span></div>
    <section class="safe-content copy">
      <div class="kicker">Phone service proof</div>
      <h1 class="headline" data-fit="headline" data-min-font-size="42">{{ headline }}</h1>
      <p class="subhead" data-fit="subhead" data-min-font-size="18">{{ subhead }}</p>
      <div class="proof-pill" data-fit="proof" data-min-font-size="13">{{ proof_label }}</div>
    </section>
    <div class="glass-panel"></div>
    <div class="mascot-wrap"><img class="mascot" src="{{ mascot_uri }}" alt=""></div>
    <div class="phone-cta" data-fit="phone"><span class="label">{{ cta }}</span><span class="number">{{ phone_number }}</span></div>
  </main>
</body>
</html>
