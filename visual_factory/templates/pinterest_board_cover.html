<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ headline }}</title>
  <style>
    {{ font_css | safe }}
    {{ tokens_css | safe }}
    {{ shared_css | safe }}
    :root { --canvas-width: {{ width }}px; --canvas-height: {{ height }}px; --safe-left: 64px; --safe-top: 60px; }
    .brand-mark { font-size: 20px; }
    .copy { left: 68px; top: 176px; width: 700px; }
    .headline { max-height: 286px; font-size: 78px; }
    .subhead { margin-top: 26px; width: 590px; max-height: 94px; font-size: 28px; }
    .proof-pill { margin-top: 30px; max-width: 650px; font-size: 22px; }
    .mascot-wrap { right: 62px; bottom: 86px; width: 278px; height: 370px; }
    .glass-panel { right: 110px; bottom: 166px; width: 218px; height: 286px; }
    .phone-cta { left: 68px; bottom: 64px; align-items: flex-start; }
    .phone-cta .number { font-size: 24px; }
  </style>
</head>
<body>
  <main class="canvas" role="img" aria-label="{{ alt_text }}">
    <div class="brand-mark"><img class="brand-icon" src="{{ brand_icon_uri }}" alt=""><span>{{ brand_name }}</span></div>
    <section class="safe-content copy">
      <div class="kicker">Pinterest board</div>
      <h1 class="headline" data-fit="headline" data-min-font-size="42">{{ topic or headline }}</h1>
      <p class="subhead" data-fit="subhead" data-min-font-size="18">{{ subhead }}</p>
      <div class="proof-pill" data-fit="proof" data-min-font-size="13">{{ proof_label }}</div>
    </section>
    <div class="glass-panel"></div>
    <div class="mascot-wrap"><img class="mascot" src="{{ mascot_uri }}" alt=""></div>
    <div class="phone-cta" data-fit="phone" data-min-font-size="12"><span class="label">{{ cta }}</span><span class="number">{{ phone_number }}</span></div>
  </main>
</body>
</html>
