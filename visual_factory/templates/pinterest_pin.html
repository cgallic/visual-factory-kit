<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ headline }}</title>
  <style>
    {{ font_css | safe }}
    {{ tokens_css | safe }}
    {{ shared_css | safe }}
    :root { --canvas-width: {{ width }}px; --canvas-height: {{ height }}px; --safe-left: 64px; --safe-top: 68px; }
    .brand-mark { font-size: 20px; }
    .copy { left: 68px; top: 190px; width: 780px; }
    .headline { max-height: 430px; font-size: 92px; }
    .subhead { margin-top: 34px; width: 720px; max-height: 136px; font-size: 34px; }
    .proof-pill { margin-top: 38px; max-width: 760px; font-size: 24px; }
    .mascot-wrap { right: 54px; bottom: 194px; width: 350px; height: 466px; }
    .glass-panel { right: 92px; bottom: 284px; width: 286px; height: 374px; }
    .phone-cta { left: 68px; bottom: 68px; align-items: flex-start; }
    .phone-cta .number { font-size: 24px; }
    .pin-tag {
      position: absolute;
      left: 68px;
      bottom: 176px;
      z-index: 4;
      color: var(--kai-brand-blue);
      font-family: var(--kai-font-proof);
      font-size: 16px;
      font-weight: 700;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <main class="canvas" role="img" aria-label="{{ alt_text }}">
    <div class="brand-mark"><img class="brand-icon" src="{{ brand_icon_uri }}" alt=""><span>{{ brand_name }}</span></div>
    <section class="safe-content copy">
      <div class="kicker">Save this for call season</div>
      <h1 class="headline" data-fit="headline" data-min-font-size="48">{{ headline }}</h1>
      <p class="subhead" data-fit="subhead" data-min-font-size="20">{{ subhead }}</p>
      <div class="proof-pill" data-fit="proof" data-min-font-size="13">{{ proof_label }}</div>
    </section>
    <div class="pin-tag" data-fit="pin-tag" data-min-font-size="11">Phone service playbook</div>
    <div class="glass-panel"></div>
    <div class="mascot-wrap"><img class="mascot" src="{{ mascot_uri }}" alt=""></div>
    <div class="phone-cta" data-fit="phone" data-min-font-size="12"><span class="label">{{ cta }}</span><span class="number">{{ phone_number }}</span></div>
  </main>
</body>
</html>
