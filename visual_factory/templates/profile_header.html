<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ headline }}</title>
  <style>
    {{ font_css | safe }}
    {{ tokens_css | safe }}
    {{ shared_css | safe }}
    :root { --canvas-width: {{ width }}px; --canvas-height: {{ height }}px; --safe-left: {{ (width * 0.06)|round|int }}px; --safe-top: {{ (height * 0.16)|round|int }}px; }
    .brand-mark { font-size: 24px; }
    .brand-icon { width: 46px; height: 46px; }
    .copy { left: {{ (width * 0.25)|round|int }}px; top: {{ (height * 0.19)|round|int }}px; width: {{ (width * 0.48)|round|int }}px; text-align: left; }
    .headline { max-height: {{ (height * 0.40)|round|int }}px; font-size: 72px; }
    .subhead { margin-top: 14px; width: {{ (width * 0.48)|round|int }}px; max-height: {{ (height * 0.18)|round|int }}px; font-size: 30px; }
    .mascot-wrap { right: {{ (width * 0.06)|round|int }}px; bottom: -10px; width: {{ (height * 0.68)|round|int }}px; height: {{ (height * 0.86)|round|int }}px; }
    .phone-cta { left: {{ (width * 0.06)|round|int }}px; bottom: {{ (height * 0.13)|round|int }}px; align-items: flex-start; }
    .phone-cta .number { font-size: 34px; }
  </style>
</head>
<body>
  <main class="canvas" role="img" aria-label="{{ alt_text }}">
    <div class="brand-mark"><img class="brand-icon" src="{{ brand_icon_uri }}" alt=""><span>{{ brand_name }}</span></div>
    <section class="safe-content copy">
      <h1 class="headline" data-fit="headline" data-min-font-size="36">{{ headline }}</h1>
      <p class="subhead" data-fit="subhead" data-min-font-size="16">{{ subhead }}</p>
    </section>
    <div class="mascot-wrap"><img class="mascot" src="{{ mascot_uri }}" alt=""></div>
    <div class="phone-cta" data-fit="phone" data-min-font-size="12"><span class="label">{{ cta }}</span><span class="number">{{ phone_number }}</span></div>
  </main>
</body>
</html>
